spring.application.name=batch-insert

# db configuration
spring.datasource.url=jdbc:postgresql://192.168.234.129:54321/db_case_study
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver


# Hibernate configuration for quoted identifiers
spring.jpa.defer-datasource-initialization=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.default_schema=batch_insert

# Batch insert config
spring.jpa.properties.hibernate.jdbc.batch_insert=30
spring.jpa.properties.hibernate.order_inserts=true
